<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endless Dodger Improved</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; color: white; font-family: Arial; }
  canvas { display: block; }
  #score { position: absolute; top: 10px; left: 10px; font-size: 20px; }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="game"></canvas><script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let player = { x: canvas.width / 2, y: canvas.height - 80, size: 25 };
let obstacles = [];
let speed = 3;
let score = 0;

function spawnObstacle() {
  obstacles.push({
    x: Math.random() * (canvas.width - 25),
    y: -25,
    size: 25
  });
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Player
  ctx.fillStyle = 'cyan';
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // Obstacles
  ctx.fillStyle = 'red';
  obstacles.forEach((o, i) => {
    o.y += speed;
    ctx.fillRect(o.x, o.y, o.size, o.size);

    // Collision
    if (
      o.x < player.x + player.size &&
      o.x + o.size > player.x &&
      o.y < player.y + player.size &&
      o.y + o.size > player.y
    ) {
      alert('Game Over! Score: ' + score);
      document.location.reload();
    }

    if (o.y > canvas.height) {
      obstacles.splice(i, 1);
      score++;
      document.getElementById('score').innerText = 'Score: ' + score;
    }
  });

  requestAnimationFrame(update);
}

// Controls (FIXED)
function movePlayer(x) {
  player.x = x - player.size / 2;

  // Keep inside screen
  if (player.x < 0) player.x = 0;
  if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
}

window.addEventListener('mousemove', (e) => movePlayer(e.clientX));
window.addEventListener('touchmove', (e) => movePlayer(e.touches[0].clientX));

setInterval(spawnObstacle, 700);
setInterval(() => speed += 0.2, 2000);

update();
</script></body>
</html>
