<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Cricket Game</title>
<style>
  body { margin: 0; background: #0b6623; color: white; font-family: Arial; overflow: hidden; }
  canvas { display: block; margin: auto; background: #228B22; }
  #ui { position: absolute; top: 10px; left: 10px; font-size: 18px; }
  #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; text-align: center; }
  button { padding: 10px 20px; font-size: 16px; }
</style>
</head>
<body>
<div id="ui">Runs: 0 | Balls: 0</div>
<div id="gameOver">
  <h1>Game Over</h1>
  <button onclick="restart()">Restart</button>
</div>
<canvas id="game" width="400" height="600"></canvas><script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let ball = { x: 200, y: 0, speed: 4 };
let bat = { x: 160, y: 550, width: 80, height: 10 };
let runs = 0;
let balls = 0;
let playing = true;

function drawPitch() {
  ctx.fillStyle = '#c2b280';
  ctx.fillRect(150, 0, 100, 600);
}

function drawBat() {
  ctx.fillStyle = 'white';
  ctx.fillRect(bat.x, bat.y, bat.width, bat.height);
}

function drawBall() {
  ctx.fillStyle = 'red';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 8, 0, Math.PI * 2);
  ctx.fill();
}

function update() {
  if (!playing) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawPitch();
  drawBat();
  drawBall();

  ball.y += ball.speed;

  // Collision (hit)
  if (
    ball.y > bat.y &&
    ball.x > bat.x &&
    ball.x < bat.x + bat.width
  ) {
    runs += Math.floor(Math.random() * 6) + 1; // random runs 1-6
    resetBall();
  }

  // Miss
  if (ball.y > canvas.height) {
    balls++;
    if (balls >= 12) {
      endGame();
    } else {
      resetBall();
    }
  }

  document.getElementById('ui').innerText = `Runs: ${runs} | Balls: ${balls}`;

  requestAnimationFrame(update);
}

function resetBall() {
  ball.x = Math.random() * 300 + 50;
  ball.y = 0;
  ball.speed += 0.3;
}

function endGame() {
  playing = false;
  document.getElementById('gameOver').style.display = 'block';
}

function restart() {
  runs = 0;
  balls = 0;
  ball.speed = 4;
  playing = true;
  document.getElementById('gameOver').style.display = 'none';
  update();
}

// Controls
window.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  bat.x = e.clientX - rect.left - bat.width / 2;
});

window.addEventListener('touchmove', (e) => {
  const rect = canvas.getBoundingClientRect();
  bat.x = e.touches[0].clientX - rect.left - bat.width / 2;
});

update();
</script></body>
</html>
