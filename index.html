<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Engine v1</title>
<style>
  body { margin:0; overflow:hidden; background:#0b6623; font-family:Arial; }
  canvas { display:block; }
  #ui { position:absolute; top:10px; left:10px; color:white; font-size:18px; }
</style>
</head>
<body>
<div id="ui">Runs: 0 | Balls: 0</div>
<canvas id="game"></canvas><script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let runs=0, balls=0;
let ball, bat;

function newBall(){
  ball = {
    x: canvas.width/2,
    y: 0,
    vx: (Math.random()-0.5)*3,
    vy: 4,
    size: 6,
    hit:false
  };
}

bat = { x: canvas.width/2 - 60, y: canvas.height - 120, w:120, h:12 };
newBall();

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // grass
  ctx.fillStyle = '#1e8f2f';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // fake 3D pitch
  ctx.fillStyle = '#c2b280';
  ctx.beginPath();
  ctx.moveTo(canvas.width/2 - 30,0);
  ctx.lineTo(canvas.width/2 + 30,0);
  ctx.lineTo(canvas.width/2 + 150,canvas.height);
  ctx.lineTo(canvas.width/2 - 150,canvas.height);
  ctx.closePath();
  ctx.fill();

  // bat
  ctx.fillStyle = 'white';
  ctx.fillRect(bat.x, bat.y, bat.w, bat.h);

  // ball (size changes = depth illusion)
  ctx.fillStyle = 'red';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI*2);
  ctx.fill();
}

function update(){
  ball.x += ball.vx;
  ball.y += ball.vy;

  // increase size as it comes closer (depth)
  ball.size = 6 + (ball.y / canvas.height) * 10;

  // bounce effect
  if(ball.y > canvas.height/2 && !ball.bounced){
    ball.vy *= 0.8;
    ball.bounced = true;
  }

  // hit detection
  if(!ball.hit &&
     ball.y > bat.y - 15 &&
     ball.x > bat.x &&
     ball.x < bat.x + bat.w){

    ball.hit = true;

    let center = bat.x + bat.w/2;
    let diff = ball.x - center;

    // direction
    ball.vx = diff * 0.25;
    ball.vy = -12;

    // timing
    let timing = Math.abs(ball.y - bat.y);
    let r = timing < 5 ? 6 : timing < 12 ? 4 : 1;
    runs += r;
  }

  // after hit
  if(ball.hit && ball.y < 0){
    balls++;
    if(balls>=6){ alert('Game Over: '+runs); location.reload(); }
    newBall();
  }

  // miss
  if(ball.y > canvas.height){
    balls++;
    if(balls>=6){ alert('Game Over: '+runs); location.reload(); }
    newBall();
  }

  document.getElementById('ui').innerText = `Runs: ${runs} | Balls: ${balls}`;
}

function loop(){ draw(); update(); requestAnimationFrame(loop); }

function move(x){ bat.x = x - bat.w/2; }
window.addEventListener('mousemove', e=>move(e.clientX));
window.addEventListener('touchmove', e=>move(e.touches[0].clientX));

loop();
</script></body>
</html>
