<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Fixed View</title>
<style>
  body { margin:0; overflow:hidden; background:#0b6623; }
  canvas { display:block; }
  #ui { position:absolute; top:10px; left:10px; color:white; font-family:Arial; font-size:18px; }
</style>
</head>
<body>
<div id="ui">Runs: 0 | Balls: 0</div>
<canvas id="game"></canvas><script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let runs=0, balls=0;
let ball, bat;

function newBall(){
  ball = {
    x: canvas.width/2,
    y: 50,
    vx: (Math.random()-0.5)*2,
    vy: 5,
    size: 6,
    hit:false
  };
}

bat = { x: canvas.width/2 - 60, y: canvas.height - 120, w:120, h:12 };
newBall();

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // grass
  ctx.fillStyle = '#1e8f2f';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // pitch
  ctx.fillStyle = '#c2b280';
  ctx.beginPath();
  ctx.moveTo(canvas.width/2 - 40,0);
  ctx.lineTo(canvas.width/2 + 40,0);
  ctx.lineTo(canvas.width/2 + 150,canvas.height);
  ctx.lineTo(canvas.width/2 - 150,canvas.height);
  ctx.closePath();
  ctx.fill();

  // 🔥 DRAW ORDER FIXED (important)

  // fielders
  ctx.fillStyle = 'red';
  ctx.fillRect(80,200,12,12);
  ctx.fillRect(canvas.width-100,250,12,12);
  ctx.fillRect(canvas.width/2 - 200,350,12,12);
  ctx.fillRect(canvas.width/2 + 200,350,12,12);

  // bowler
  ctx.fillStyle = 'blue';
  ctx.fillRect(canvas.width/2 - 10,30,20,20);

  // stumps
  ctx.fillStyle = 'yellow';
  ctx.fillRect(canvas.width/2 - 6, bat.y - 15,4,25);
  ctx.fillRect(canvas.width/2, bat.y - 15,4,25);
  ctx.fillRect(canvas.width/2 + 6, bat.y - 15,4,25);

  // batsman
  ctx.fillStyle = 'white';
  ctx.fillRect(bat.x + bat.w/2 - 10, bat.y - 30,20,20);

  // bat
  ctx.fillRect(bat.x, bat.y, bat.w, bat.h);

  // ball (on top always)
  ctx.fillStyle = 'red';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI*2);
  ctx.fill();
}

function update(){
  ball.x += ball.vx;
  ball.y += ball.vy;

  ball.size = 6 + (ball.y / canvas.height) * 10;

  // hit
  if(!ball.hit && ball.y > bat.y - 15 && ball.x > bat.x && ball.x < bat.x + bat.w){
    ball.hit = true;
    ball.vy = -12;
    runs += 4;
  }

  // reset
  if(ball.y > canvas.height || (ball.hit && ball.y < 0)){
    balls++;
    if(balls>=6){ alert('Game Over: '+runs); location.reload(); }
    newBall();
  }

  document.getElementById('ui').innerText = `Runs: ${runs} | Balls: ${balls}`;
}

function loop(){ draw(); update(); requestAnimationFrame(loop); }

window.addEventListener('mousemove', e=> bat.x = e.clientX - bat.w/2);
window.addEventListener('touchmove', e=> bat.x = e.touches[0].clientX - bat.w/2);

loop();
</script></body>
</html>
