<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Game - nPower Style</title>
<style>
  body { margin:0; overflow:hidden; background:#0b6623; font-family:Arial; }
  canvas { display:block; }
  #ui { position:absolute; top:10px; left:10px; color:white; font-size:18px; }
</style>
</head>
<body>
<div id="ui">Runs: 0 | Balls: 0</div>
<canvas id="game"></canvas><script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let runs=0, balls=0;
let ball, bat;

function newBall(){
  ball = {
    x: canvas.width/2,
    y: 0,
    vx: (Math.random()-0.5)*4,
    vy: 6,
    hit:false
  };
}

bat = { x: canvas.width/2 - 60, y: canvas.height - 100, w:120, h:12 };
newBall();

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // grass
  ctx.fillStyle = '#1e8f2f';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // pitch perspective
  ctx.fillStyle = '#c2b280';
  ctx.beginPath();
  ctx.moveTo(canvas.width/2 - 40,0);
  ctx.lineTo(canvas.width/2 + 40,0);
  ctx.lineTo(canvas.width/2 + 120,canvas.height);
  ctx.lineTo(canvas.width/2 - 120,canvas.height);
  ctx.closePath();
  ctx.fill();

  // bat
  ctx.fillStyle = 'white';
  ctx.fillRect(bat.x, bat.y, bat.w, bat.h);

  // ball
  ctx.fillStyle = 'red';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 10, 0, Math.PI*2);
  ctx.fill();
}

function update(){
  ball.x += ball.vx;
  ball.y += ball.vy;

  // hit detection
  if(!ball.hit &&
     ball.y > bat.y - 10 &&
     ball.x > bat.x &&
     ball.x < bat.x + bat.w){

    ball.hit = true;

    let center = bat.x + bat.w/2;
    let diff = ball.x - center;

    // direction (leg/off)
    ball.vx = diff * 0.2;
    ball.vy = -12;

    // runs based on timing
    let timing = Math.abs(ball.y - bat.y);
    let r = timing < 5 ? 6 : timing < 10 ? 4 : 2;
    runs += r;
  }

  // after hit → goes out
  if(ball.hit && ball.y < 0){
    balls++;
    if(balls>=6){
      alert('Game Over! Runs: '+runs);
      location.reload();
    }
    newBall();
  }

  // miss
  if(ball.y > canvas.height){
    balls++;
    if(balls>=6){
      alert('Game Over! Runs: '+runs);
      location.reload();
    }
    newBall();
  }

  document.getElementById('ui').innerText = `Runs: ${runs} | Balls: ${balls}`;
}

function loop(){ draw(); update(); requestAnimationFrame(loop); }

// controls
function move(x){
  bat.x = x - bat.w/2;
}

window.addEventListener('mousemove', e=>move(e.clientX));
window.addEventListener('touchmove', e=>move(e.touches[0].clientX));

loop();
</script></body>
</html>
